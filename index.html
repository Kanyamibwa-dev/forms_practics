<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <p>Please fill in the form below to register:</p>
    <form>
        <label for="fName">First Name:</label>
        <input type="text" placeholder="enter your first name" required><br><br>
         <label for="lName">Last Name:</label>
        <input type="text"  placeholder="enter your last name" required><br><br>
        <label for="email">Email:</label>
        <input type="email" placeholder="enter your email" required><br><br>
        <label for="password">Password:</label>
        <input type="password" placeholder="enter your password" required><br><br>
        <label for ="gender">Gender:</label>
            <input type="radio" name="gender" value="male" required> 
            Male
            <input type="radio" name="gender" value="female" required> 
            Female
            <br/><br/>
            <label for="age">Age:</label>
            <input type="number" min="18" max="60" placeholder="age" required><br><br>
            <h3>Hobbies:</h3>
            <input type="checkbox" name="hobbies" value="reading"> Reading<br/>
            <input type="checkbox" name="hobbies" value="traveling"> Traveling<br/>
            <input type="checkbox" name="hobbies" value="cooking"> Cooking<br/>
            <input type="checkbox" name="hobbies" value="sports"> Sports<br/>
                <input type="checkbox" name="hobbies" value="music"> Music <br/><br/>
                <label for="country">Country:</label>
                <select name="country" id="country" required>
                    <option value="">Select your country</option>
                    <option value="Rwanda">Rwanda</option>
                    <option value="canada">Kenya</option>
                    <option value="uk">Uganda</option>
                    <option value="australia">Burundi</option>
                    <option value="india">Tanzania</option>
                </select><br><br>
        <input type="button" value="Submit">
    </form>
</body>
</html>
